    title: Patch production incident class + guardrails (leadership says “drop everything”)
    state: doing
    owner_id: marcus
  - id: D2
    title: Net-new upsell feature Sales promised for quarter-end
    state: doing
    owner_id: dana
  - id: O1
    title: Leadership priority reset — Director attends; publish one ranked list (deprioritize something explicitly)
    state: backlog
    owner_id: lia
  - id: O2
    title: Psychologically safe retro on overload and workload reduction — agenda + one team norm in writing
    state: backlog
    owner_id: lia

org_initial_vitals:
