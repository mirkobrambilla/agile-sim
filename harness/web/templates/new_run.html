{% extends "base.html" %}
{% block title %}New live run — agile-sim{% endblock %}
{% block body %}
<div class="max-w-lg mx-auto p-6 flex flex-col gap-4">
  <h1 class="text-xl font-bold">Start a live run</h1>
  <p class="text-sm text-[var(--color-text-muted)]">Creates a run under {{ runs_dir }} and opens the runner. Requires OpenRouter credentials in <code class="font-mono">secrets.yaml</code>.</p>
  <form method="post" action="/runs" class="flex flex-col gap-3">
    <label class="flex flex-col gap-1 text-sm">
      <span class="font-semibold">Scenario</span>
      <select name="scenario_slug" required class="border border-[var(--color-border)] rounded-[var(--radius-sm)] px-2 py-2">
        {% for s in scenarios %}
        <option value="{{ s.slug }}">{{ s.slug }}</option>
        {% else %}
        <option value="">(no scenarios/ with scenario.yaml)</option>
        {% endfor %}
      </select>
    </label>
    <label class="flex flex-col gap-1 text-sm">
      <span class="font-semibold">Agent model</span>
      <input name="agent_model" value="stub" class="border border-[var(--color-border)] rounded-[var(--radius-sm)] px-2 py-2 font-mono" />
    </label>
    <label class="flex flex-col gap-1 text-sm">
      <span class="font-semibold">Coach model (optional)</span>
      <input name="coach_model" placeholder="defaults to agent model" class="border border-[var(--color-border)] rounded-[var(--radius-sm)] px-2 py-2 font-mono" />
    </label>
    <label class="flex flex-col gap-1 text-sm">
      <span class="font-semibold">Coach mode</span>
      <select name="coach_mode" class="border border-[var(--color-border)] rounded-[var(--radius-sm)] px-2 py-2">
        <option value="llm">llm</option>
        <option value="human">human (you post between turns)</option>
        <option value="none">none</option>
        <option value="preset">preset (scenario file)</option>
      </select>
    </label>
    <button type="submit" class="btn btn-primary mt-2">Create run</button>
  </form>
  <p class="text-sm"><a href="/" class="text-[var(--color-accent)] hover:underline">← All runs</a></p>
</div>
{% endblock %}
