<div class="inspector-sheet flex flex-col gap-3 text-sm">
  <div class="flex justify-between items-start gap-2">
    <h3 class="text-base font-bold">Channel</h3>
    <button type="button" class="text-xs text-[var(--color-text-muted)] hover:underline" @click="inspectorOpen = false">Close</button>
  </div>
  <p class="font-mono text-xs">{{ inspect_channel or '—' }}</p>
  {% if channel_inspector_meta %}
  <ul class="list-none p-0 m-0 text-xs text-[var(--color-text-muted)] flex flex-col gap-1">
    <li>Messages: {{ channel_inspector_meta.message_count }}</li>
    <li>Coach engagement: {{ channel_inspector_meta.coach_engagement }}</li>
    <li>Members: {{ channel_inspector_meta.members | join(', ') }}</li>
  </ul>
  {% endif %}
</div>
