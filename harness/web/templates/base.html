<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}agile-sim harness{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css" />
  <style>[x-cloak] { display: none !important; }</style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen font-[family-name:var(--font-ui)] bg-[var(--color-bg-app)] text-[var(--color-text)] antialiased">
{% block body %}{% endblock %}
</body>
</html>
