apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agile-sim.fullname" . }}
  labels:
    {{- include "agile-sim.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agile-sim.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agile-sim.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agile-sim
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
          env:
            - name: AGILE_SIM_HOST
              value: {{ .Values.server.host | quote }}
            - name: AGILE_SIM_PORT
              value: {{ .Values.server.port | quote }}
            - name: AGILE_SIM_RUNS_DIR
              value: /data/runs
            - name: AGILE_SIM_SCENARIOS_DIR
              value: /data/scenarios
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            - name: secrets
              mountPath: /app/secrets.yaml
              subPath: secrets.yaml
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agile-sim.pvcName" . }}
        {{- end }}
        - name: secrets
          secret:
            secretName: {{ include "agile-sim.secretName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
