{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agile-sim.secretName" . }}
  labels:
    {{- include "agile-sim.labels" . | nindent 4 }}
type: Opaque
stringData:
  secrets.yaml: |
    openrouter_api_key: {{ .Values.secrets.openrouterApiKey | quote }}
{{- end }}
