# Copy to secret.yaml, fill in the real key, and apply — never commit the real file.
# kubectl create secret generic agile-sim-secrets \
#   --namespace agile-sim \
#   --from-literal=openrouter_api_key=sk-or-v1-xxxxx
apiVersion: v1
kind: Secret
metadata:
  name: agile-sim-secrets
  namespace: agile-sim
type: Opaque
stringData:
  # Mounted into the container as /app/secrets.yaml (see deployment.yaml).
  secrets.yaml: |
    openrouter_api_key: "your-openrouter-api-key-here"
